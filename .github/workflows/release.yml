name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    # Reusable workflow: the caller's job-level permissions are the ceiling
    # for every job inside ci.yml. Without this block, the top-level
    # `permissions: {}` propagates as "contents: none" and ci.yml fails at
    # startup because every inner job requests `contents: read`.
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yml

  publish:
    needs: ci
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    needs: ci
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
