<!DOCTYPE html>
<html>
<head>
    <title>{{ app_name }} - {{ title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>{{ style|safe }}</style>
</head>
<body>
    <h1>{{ title }}</h1>
    <p class="info">Enter your setup token to register a passkey for authenticating OAuth requests.</p>
    <div id="form-section">
        <label for="setup-token">Setup token:</label>
        <input type="password" id="setup-token" placeholder="Enter setup token" value="{{ prefill_token }}" autofocus>
        <button class="btn" onclick="startRegistration()">Register Passkey</button>
    </div>
    <div id="status" style="display:none"></div>
    <script>
    const autoStart = {{ auto_start }};
    function bufToBase64url(buf) {
        const bytes = new Uint8Array(buf);
        let str = '';
        for (const b of bytes) str += String.fromCharCode(b);
        return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
    }

    function base64urlToBuf(b64) {
        const str = atob(b64.replace(/-/g, '+').replace(/_/g, '/') + '=='.slice(0, (4 - b64.length % 4) % 4));
        const buf = new Uint8Array(str.length);
        for (let i = 0; i < str.length; i++) buf[i] = str.charCodeAt(i);
        return buf.buffer;
    }

    async function startRegistration() {
        const status = document.getElementById('status');
        const formSection = document.getElementById('form-section');
        const token = document.getElementById('setup-token').value;

        status.style.display = 'block';
        status.className = 'info';
        status.textContent = 'Starting registration...';

        try {
            const startResp = await fetch('/passkey/register/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ setup_token: token })
            });
            if (!startResp.ok) {
                const err = await startResp.json();
                throw new Error(err.error_description || err.error);
            }
            const { session_id, creation_options } = await startResp.json();

            // Decode challenge and user.id
            creation_options.publicKey.challenge = base64urlToBuf(creation_options.publicKey.challenge);
            creation_options.publicKey.user.id = base64urlToBuf(creation_options.publicKey.user.id);
            if (creation_options.publicKey.excludeCredentials) {
                for (const c of creation_options.publicKey.excludeCredentials) {
                    c.id = base64urlToBuf(c.id);
                }
            }

            status.textContent = 'Touch your authenticator...';
            const credential = await navigator.credentials.create({ publicKey: creation_options.publicKey });

            const body = {
                session_id,
                credential: {
                    id: credential.id,
                    rawId: bufToBase64url(credential.rawId),
                    type: credential.type,
                    response: {
                        attestationObject: bufToBase64url(credential.response.attestationObject),
                        clientDataJSON: bufToBase64url(credential.response.clientDataJSON)
                    }
                }
            };

            const finishResp = await fetch('/passkey/register/finish', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            if (!finishResp.ok) {
                const err = await finishResp.json();
                throw new Error(err.error_description || err.error);
            }

            formSection.style.display = 'none';
            status.textContent = 'Passkey registered successfully! You can close this page.';
            status.className = 'info';
        } catch (e) {
            status.textContent = 'Registration failed: ' + e.message;
            status.className = 'error';
        }
    }

    // Allow Enter key to submit
    document.getElementById('setup-token').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') startRegistration();
    });

    // Auto-start if token was provided via URL
    if (autoStart && document.getElementById('setup-token').value) {
        startRegistration();
    }
    </script>
</body>
</html>
